name: Release

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Check if version changed and create tag ──────────────────────────────
  prepare:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "No tag found for v${{ steps.version.outputs.version }} — will release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  # ── 2. Build on all platforms ────────────────────────────────────────────────
  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            artifact-name: linux
          - platform: windows-latest
            args: ''
            artifact-name: windows
          - platform: macos-latest
            args: --target universal-apple-darwin
            artifact-name: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Add macOS targets (x86_64 + arm64 for universal binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app and publish to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.prepare.outputs.version }}
          releaseName: Nexus v${{ needs.prepare.outputs.version }}
          releaseBody: |
            ## Nexus v${{ needs.prepare.outputs.version }}

            Download the installer for your platform from the assets below.

            | Platform | File |
            |---|---|
            | Linux (Debian/Ubuntu) | `.deb` |
            | Linux (Fedora/RHEL) | `.rpm` |
            | Windows | `.msi` or `.exe` (NSIS) |
            | macOS (Intel + Apple Silicon) | `.dmg` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ── 3. Generate latest.json for the Tauri updater ───────────────────────────
  publish-updater-manifest:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          TAG="v${VERSION}"

          # Fetch all release assets via GH API
          ASSETS=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.assets')

          find_url() {
            echo "$ASSETS" | jq -r --arg p "$1" '.[] | select(.name | test($p)) | .browser_download_url' | head -1
          }

          LINUX_DEB_URL=$(find_url '\.deb$')
          LINUX_SIG_URL=$(find_url '\.deb\.sig$')
          WIN_URL=$(find_url '\.exe$')        # prefer NSIS installer
          WIN_SIG_URL=$(find_url '\.exe\.sig$')
          MAC_TAR_URL=$(find_url '\.app\.tar\.gz$')
          MAC_SIG_URL=$(find_url '\.app\.tar\.gz\.sig$')

          # Fall back to .msi if no .exe
          if [ -z "$WIN_URL" ]; then
            WIN_URL=$(find_url '\.msi$')
            WIN_SIG_URL=$(find_url '\.msi\.sig$')
          fi

          # Download signature files (they are small text files)
          fetch_sig() { [ -n "$1" ] && curl -fsSL "$1" || echo ""; }
          LINUX_SIG=$(fetch_sig "$LINUX_SIG_URL")
          WIN_SIG=$(fetch_sig "$WIN_SIG_URL")
          MAC_SIG=$(fetch_sig "$MAC_SIG_URL")

          # Build JSON safely with jq (handles escaping automatically)
          jq -n \
            --arg version  "$TAG" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes    "Nexus ${TAG}" \
            --arg linux_url  "$LINUX_DEB_URL" \
            --arg linux_sig  "$LINUX_SIG" \
            --arg win_url    "$WIN_URL" \
            --arg win_sig    "$WIN_SIG" \
            --arg mac_url    "$MAC_TAR_URL" \
            --arg mac_sig    "$MAC_SIG" \
            '{
              version:  $version,
              notes:    $notes,
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64":  { url: $linux_url, signature: $linux_sig },
                "windows-x86_64": { url: $win_url,   signature: $win_sig  },
                "darwin-x86_64":  { url: $mac_url,   signature: $mac_sig  },
                "darwin-aarch64": { url: $mac_url,   signature: $mac_sig  }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "${TAG}" latest.json --clobber
